<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7DFF"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- House -->
  <g transform="translate(256,230)">
    <!-- Roof -->
    <polygon points="-140,-120 0,-240 140,-120" fill="white" opacity="0.95"/>
    <!-- Body -->
    <rect x="-110" y="-120" width="220" height="180" fill="white" opacity="0.95"/>
    <!-- Door -->
    <rect x="-35" y="-10" width="70" height="110" rx="35" fill="#4F7DFF"/>
    <!-- Windows -->
    <rect x="-95" y="-85" width="55" height="50" rx="8" fill="#FF6B9D" opacity="0.8"/>
    <rect x="40" y="-85" width="55" height="50" rx="8" fill="#FF6B9D" opacity="0.8"/>
    <!-- Chimney -->
    <rect x="70" y="-230" width="30" height="90" fill="white" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="256" y="430" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" opacity="0.92" letter-spacing="2">FAMILY HUB</text>
</svg>